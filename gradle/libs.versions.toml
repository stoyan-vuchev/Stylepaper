[versions]

# Plugin Versions
agpVersion = "8.13.0"
kotlinVersion = "2.2.20"
kspVersion = "2.2.20-2.0.3"
daggerHiltVersion = "2.57.1"

# Core Dependency Versions
coreVersion = "1.17.0"
lifecycleKtxVersion = "2.9.3"
coilVersion = "2.7.0"
threetenabpVersion = "1.4.9"
material = "1.13.0"

# Compose Dependency Versions
composeBomVersion = "2025.09.00"
activityComposeVersion = "1.11.0"
lifecycleComposeVersion = "2.9.3"
navigationComposeVersion = "2.9.4"

# Testing Dependency Versions
espressoCoreVersion = "3.7.0"
jUnitVersion = "4.13.2"
androidxTestCoreVersion = "1.7.0"
androidxJUnitVersion = "1.3.0"
androidxArchCoreTestingVersion = "2.2.0"
assertKVersion = "1.4.5"
appCashTurbineVersion = "1.2.1"
coroutinesTestVersion = "1.10.2"
mockwebserverVersion = "5.1.0"
mockkVersion = "1.14.5"

# Storage Dependency Versions
dataStoreVersion = "1.1.7"
roomVersion = "2.8.0"

# Dependency Injection Dependency Versions
androidxHiltNavigationComposeVersion = "1.3.0"
androidxHiltCompilerVersion = "1.3.0"

# Serialization Dependency Versions
gsonVersion = "2.13.2"
kotlinxSerializationVersion = "1.9.0"

# Networking Dependency Versions
retrofitVersion = "3.0.0"
okhttp3Version = "5.1.0"

# Other Dependency Versions
systemUIBarsTweakerVersion = "1.2.4"
squircleShapeVersion = "4.0.0"

# ================================================================================================

[libraries]

# Core Dependencies
core = { group = "androidx.core", name = "core-ktx", version.ref = "coreVersion" }
